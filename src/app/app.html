<a class="skip-link" href="#main" i18n="@@a11y.skipToContent">Skip to content</a>

<header class="app-header" role="banner" [class.app-header--elevated]="isScrolled()">
  <div class="container header-inner">
    <a class="brand" routerLink="/movies" i18n="@@app.brand">Movie Explorer</a>
  </div>
</header>

<main #main id="main" class="app-main" tabindex="-1">
  <div class="container">
    <router-outlet />
  </div>
</main>

@if (showGoToTop()) {
  <button
    type="button"
    class="go-top"
    (click)="goToTop()"
    aria-label="Go to top"
    i18n-aria-label="@@a11y.goToTop"
  >
    ↑
  </button>
}

<footer class="app-footer">
  <div class="container footer-inner">
    <p class="footer-copy" i18n="@@app.footerNote">
      Data provided by TMDB. This product uses the TMDB API but is not endorsed or certified by TMDB.
    </p>
  </div>
</footer>
